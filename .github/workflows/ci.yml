name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm tsc --noEmit
      - name: Typecheck (worker)
        run: pnpm tsc --noEmit -p tsconfig.worker.json
      - name: Schema validation
        run: pnpm drizzle-kit check
      - name: Test
        run: pnpm vitest run
      - name: Build
        run: pnpm next build
